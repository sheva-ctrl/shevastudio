<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheva Studio — AI Starter Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght=600;700;800&family=Space+Mono:wght=400;700&family=Lexend:wght=300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --violet:#6020D0; --violet-2:#7C3AED; --teal:#0891B2;
    --ink:#15151C; --muted:#55555F; --line:#E7E5EE;
    --bg:#FCFCFE; --card:#FFFFFF;
    --grad:linear-gradient(100deg,var(--violet) 0%,var(--violet-2) 45%,var(--teal) 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Lexend',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.65;font-weight:400;-webkit-font-smoothing:antialiased;
    padding:clamp(28px,6vw,72px) clamp(20px,5vw,64px)}
  .wrap{max-width:880px;margin:0 auto}

  .back-btn {
    font-family:'Space Mono',monospace;
    font-size:12px; text-decoration:none; color:var(--violet);
    display:inline-flex; align-items:center; gap:6px; margin-bottom:32px;
    font-weight:700; text-transform:uppercase; letter-spacing:0.1em;
  }
  .back-btn:hover { color:var(--teal); }

  .kicker{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--violet);display:inline-flex;align-items:center;gap:10px;margin-bottom:22px}
  .kicker::before{content:"";width:34px;height:2px;background:var(--grad);border-radius:2px}
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(34px,7vw,56px);
    line-height:1.04;letter-spacing:-0.02em;margin-bottom:22px}
  h1 .accent{background:var(--grad);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent}
  .lede{font-size:clamp(17px,2.4vw,21px);color:var(--muted);font-weight:300;max-width:60ch;margin-bottom:24px;}
  .lede strong{color:var(--ink);font-weight:500}

   /* pro tip */
  .protip{background:rgba(96,32,208,.06);border:1px solid rgba(96,32,208,.18);border-radius:14px;
    padding:16px 18px;margin:0 0 20px;font-size:15.5px;color:var(--ink);font-weight:300;line-height:1.6}
  .protip .lbl{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--violet);display:block;margin-bottom:6px;font-weight:700}
  .protip b{font-weight:600}
  
  .objective{margin-top:20px;padding-left:16px;border-left:3px solid var(--violet);
    font-size:16px;color:var(--ink);font-weight:300;line-height:1.6;max-width:62ch}
  .objective b{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--violet);display:block;margin-bottom:5px;font-weight:700}

  .section{margin-top:clamp(44px,7vw,68px)}
  .eyebrow{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--violet);margin-bottom:6px;display:block}
  .section h2{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(23px,4vw,30px);
    letter-spacing:-0.01em;margin-bottom:18px}
  .section h2 .sub{display:block;font-family:'Lexend';font-weight:300;font-size:16px;
    color:var(--muted);letter-spacing:0;margin-top:6px}

  /* accordion bubbles */
  .hint{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin:0 0 12px}
  .acc{display:flex;flex-direction:column;gap:8px}
  button.piece{width:100%;text-align:left;cursor:pointer;font-family:'Space Mono',monospace;font-size:14px;
    font-weight:700;padding:13px 18px;border-radius:14px;background:#fff;border:1.5px solid var(--line);
    color:var(--ink);display:flex;justify-content:space-between;align-items:center;gap:12px;
    transition:border-color .15s,background .15s}
  button.piece b{color:var(--violet)}
  button.piece .pm{font-family:'Space Mono',monospace;color:var(--violet);font-size:20px;line-height:1;flex:0 0 auto}
  button.piece:hover{border-color:var(--violet)}
  button.piece[aria-expanded="true"]{background:var(--grad);border-color:transparent;color:#fff}
  button.piece[aria-expanded="true"] b,button.piece[aria-expanded="true"] .pm{color:#fff}
  button.piece:focus-visible{outline:3px solid var(--teal);outline-offset:3px}
  .piece-ex{font-size:15px;color:var(--muted);font-weight:300;line-height:1.6;padding:10px 18px 6px}
  .piece-ex .k{font-family:'Space Mono',monospace;font-weight:700;color:var(--violet);font-size:12.5px}
  .piece-ex .opt{color:var(--muted);font-weight:400}
  .piece-ex .ex{color:var(--ink)}
  .piece-ex[hidden]{display:none}

  .promptbox{font-family:'Space Mono',monospace;font-size:14px;line-height:1.6;background:#fff;
    border:1px solid var(--line);border-left:4px solid var(--violet);border-radius:0 12px 12px 0;
    padding:14px 18px;margin:10px 0;color:var(--ink)}
  .promptbox.first{margin-top:22px}
  .promptbox .lbl{display:block;color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}

  /* steps */
  .steps{list-style:none;counter-reset:s}
  .steps li{counter-increment:s;display:flex;gap:16px;padding:14px 0;align-items:flex-start}
  .steps li::before{content:counter(s,decimal-leading-zero);font-family:'Space Mono',monospace;font-weight:700;
    color:var(--violet);font-size:15px;flex:0 0 auto;padding-top:2px}
  .steps .t{font-family:'Syne',sans-serif;font-weight:700;font-size:17px}
  .steps .d{font-size:15px;color:var(--muted);font-weight:300}

  /* stick points */
  .points{list-style:none;display:grid;gap:14px;margin-top:4px}
  .points li{padding-left:20px;position:relative;font-size:15.5px;color:var(--muted);font-weight:300}
  .points li::before{content:"";position:absolute;left:0;top:9px;width:9px;height:9px;border-radius:3px;background:var(--grad)}
  .points li b{color:var(--ink);font-weight:600;font-family:'Lexend'}

  .rule{background:var(--ink);color:#fff;border-radius:16px;padding:24px 26px;margin-top:6px}
  .rule .eyebrow{color:#C9B8FF}
  .rule p{font-size:16px;font-weight:300;color:#E9E9F1;line-height:1.6}
  .rule p b{color:#fff;font-weight:500}

  /* tool picker */
  .tool{display:flex;gap:16px;align-items:flex-start;padding:18px 0;border-top:1px solid var(--line)}
  .tool:last-child{border-bottom:1px solid var(--line)}
  a.badge{flex:0 0 auto;width:44px;height:44px;border-radius:11px;background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;overflow:hidden;transition:transform .15s,border-color .15s}
  a.badge img{width:24px;height:24px;display:block}
  a.badge:hover{transform:translateY(-2px);border-color:var(--violet)}
  a.badge:focus-visible{outline:3px solid var(--teal);outline-offset:3px}
  .tool .body{flex:1;min-width:0}
  .tool .name{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.01em}
  .tool .best{font-size:15px;color:var(--muted);font-weight:300;margin-top:2px}
  .tool .tryif{font-family:'Space Mono',monospace;font-size:12.5px;color:var(--ink);margin-top:8px;line-height:1.5}
  .tool .tryif b{color:var(--violet);font-weight:700}

  /* CTA */
  .cta{margin-top:clamp(44px,7vw,68px);border-top:1px solid var(--line);padding-top:34px}
  .cta h2{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp
