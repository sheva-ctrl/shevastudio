<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Sheva & David — Photo Booth</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'serif'],
            sans: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            tiffany: { light: '#E6F8F7', DEFAULT: '#0ABAB5', medium: '#099E9A', dark: '#05615F' },
            slateCustom: { 900: '#0F172A', 800: '#1E293B', 100: '#F1F5F9' }
          }
        }
      }
    }
  </script>

  <style>
    body { touch-action: manipulation; background-color: #0F172A; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .serif-font { font-family: 'Cormorant Garamond', serif; }
    .flash-active { animation: camera-flash 0.5s ease-out; }
    @keyframes camera-flash {
      0% { opacity: 0; }
      50% { opacity: 1; background-color: #ffffff; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between p-6">

  <div id="flash" class="fixed inset-0 z-50 pointer-events-none opacity-0"></div>

  <!-- HEADER -->
  <header class="flex justify-between items-center bg-slateCustom-800/60 backdrop-blur border border-white/10 rounded-2xl px-6 py-4 mb-4">
    <div>
      <h1 class="serif-font text-3xl font-light text-tiffany">Sheva <span class="italic font-extralight">&amp;</span> David</h1>
      <p id="sub-header-date" class="text-[10px] font-sans uppercase tracking-[0.2em] text-slate-400">Engagement Celebration · June 27th, 2026</p>
    </div>
    <button onclick="toggleConfigModal()" class="text-slate-500 hover:text-tiffany text-xs bg-slate-900/40 px-3 py-1.5 rounded-lg border border-white/5">⚙️ Customize</button>
  </header>

  <!-- WORKSPACE -->
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow items-stretch">

    <!-- CAMERA -->
    <div class="lg:col-span-7 flex flex-col justify-center bg-black/40 border border-white/10 rounded-3xl relative overflow-hidden p-2 min-h-[450px]">
      <video id="video" autoplay playsinline class="w-full h-full object-cover rounded-2xl bg-black transform -scale-x-100"></video>

      <div id="countdown-overlay" class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <span id="countdown-number" class="text-9xl font-bold serif-font text-tiffany animate-ping">3</span>
        <span id="photo-index-label" class="text-xs uppercase tracking-[0.2em] text-slate-300 mt-4">Get Ready</span>
      </div>

      <div class="absolute top-6 left-6 bg-black/60 backdrop-blur text-white px-3 py-1.5 rounded-full text-xs font-semibold flex items-center gap-2">
        <span id="camera-status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></span>
        <span id="camera-status-text">Standby</span>
      </div>
    </div>

    <!-- STRIP + ACTIONS -->
    <div class="lg:col-span-5 flex flex-col justify-between bg-slateCustom-800/40 border border-white/10 rounded-3xl p-6 relative">
      <div class="flex-grow min-h-0 flex items-center justify-center overflow-y-auto py-2">
        <div id="photo-strip" class="bg-white text-slate-900 p-4 shadow-2xl rounded-sm w-[210px] flex flex-col gap-3 border border-slate-200">
          <div class="aspect-[4/3] bg-slate-100 border border-slate-200 rounded-sm overflow-hidden relative">
            <img id="strip-img-1" src="" class="w-full h-full object-cover hidden" />
            <div id="strip-placeholder-1" class="absolute inset-0 flex items-center justify-center text-xs text-slate-400">Photo 1</div>
          </div>
          <div class="aspect-[4/3] bg-slate-100 border border-slate-200 rounded-sm overflow-hidden relative">
            <img id="strip-img-2" src="" class="w-full h-full object-cover hidden" />
            <div id="strip-placeholder-2" class="absolute inset-0 flex items-center justify-center text-xs text-slate-400">Photo 2</div>
          </div>
          <div class="aspect-[4/3] bg-slate-100 border border-slate-200 rounded-sm overflow-hidden relative">
            <img id="strip-img-3" src="" class="w-full h-full object-cover hidden" />
            <div id="strip-placeholder-3" class="absolute inset-0 flex items-center justify-center text-xs text-slate-400">Photo 3</div>
          </div>
          <div class="text-center pt-2 border-t border-slate-100">
            <p class="text-[7px] font-sans uppercase tracking-[0.25em] text-tiffany font-bold">Save the Date</p>
            <p id="strip-names" class="serif-font text-lg font-bold tracking-tight text-slate-800 mt-0.5">Sheva &amp; David</p>
            <p id="strip-date" class="text-[8px] font-sans uppercase tracking-[0.15em] text-slate-500 mt-0.5">September 4th, 2026</p>
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="space-y-3 mt-4">
        <button id="start-btn" onclick="startPhotoBooth()" class="w-full bg-tiffany hover:bg-tiffany-medium text-white py-4 rounded-xl text-sm font-bold uppercase tracking-wider shadow-lg transition-all flex items-center justify-center gap-2">
          📸 Start 3-Photo Session
        </button>

        <!-- Primary share action: opens the native iOS share sheet (Messages, Mail, AirDrop, Save to Photos) -->
        <button id="share-btn" disabled onclick="shareStrip()" class="w-full bg-tiffany/90 hover:bg-tiffany text-white disabled:opacity-40 disabled:cursor-not-allowed py-4 rounded-xl text-sm font-bold uppercase tracking-wider shadow-lg transition-all flex items-center justify-center gap-2">
          📲 Share My Strip
        </button>

        <div class="grid grid-cols-2 gap-3">
          <button id="download-btn" disabled onclick="saveStrip()" class="bg-slate-700/60 hover:bg-slate-700 text-white disabled:opacity-40 disabled:cursor-not-allowed py-3 rounded-xl text-xs font-semibold uppercase tracking-wider transition-all">
            💾 Save to iPad
          </button>
          <button id="reset-btn" disabled onclick="resetPhotoBooth()" class="bg-rose-900/40 hover:bg-rose-900 border border-rose-500/20 text-rose-300 disabled:opacity-40 disabled:cursor-not-allowed py-3 rounded-xl text-xs font-semibold uppercase tracking-wider transition-all">
            🔄 Retake
          </button>
        </div>

        <p id="share-status" class="text-center text-[11px] text-slate-400 h-4"></p>
      </div>
    </div>
  </div>

  <!-- CONFIG MODAL -->
  <div id="config-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-slateCustom-800 border border-white/10 rounded-2xl w-full max-w-md p-6 shadow-2xl">
      <h3 class="serif-font text-2xl text-tiffany mb-4">Customize the Strip</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-xs uppercase tracking-wide text-slate-400 mb-1.5">Names</label>
          <input id="input-names" type="text" value="Sheva & David" class="w-full bg-slate-900 rounded-xl px-4 py-3 border border-white/10 text-sm text-white focus:outline-none focus:border-tiffany" />
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wide text-slate-400 mb-1.5">Subtitle</label>
          <input id="input-sub" type="text" value="Engagement Celebration" class="w-full bg-slate-900 rounded-xl px-4 py-3 border border-white/10 text-sm text-white focus:outline-none focus:border-tiffany" />
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wide text-slate-400 mb-1.5">Date</label>
          <input id="input-date" type="text" value="September 4th, 2026" class="w-full bg-slate-900 rounded-xl px-4 py-3 border border-white/10 text-sm text-white focus:outline-none focus:border-tiffany" />
        </div>
      </div>
      <div class="flex gap-3 mt-6 pt-4 border-t border-white/5">
        <button onclick="toggleConfigModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl text-xs font-bold uppercase transition-all">Cancel</button>
        <button onclick="saveConfig()" class="flex-1 bg-tiffany hover:bg-tiffany-medium text-white py-3 rounded-xl text-xs font-bold uppercase transition-all">Save Changes</button>
      </div>
    </div>
  </div>

  <footer class="text-center text-xs text-slate-500 mt-4">
    Mount the iPad in landscape · Tap “Share My Strip” to text, email, AirDrop, or save to Photos
  </footer>

  <canvas id="canvas" class="hidden"></canvas>

  <script>
    let stream, wakeLock = null;
    let imagesCaptured = [];
    let currentPhotoIndex = 0;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('start-btn');
    const shareBtn = document.getElementById('share-btn');
    const downloadBtn = document.getElementById('download-btn');
    const resetBtn = document.getElementById('reset-btn');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const countdownNumber = document.getElementById('countdown-number');
    const indexLabel = document.getElementById('photo-index-label');
    const flashOverlay = document.getElementById('flash');
    const shareStatus = document.getElementById('share-status');

    // Start the front camera on load
    window.onload = async function () {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        document.getElementById('camera-status-dot').className = "w-2.5 h-2.5 rounded-full bg-teal-500";
        document.getElementById('camera-status-text').innerText = "Camera ready";
      } catch (err) {
        document.getElementById('camera-status-text').innerText = "Camera blocked — allow access in Safari";
      }
    };

    // Keep the screen awake during the party (best effort; harmless if unsupported)
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (e) { /* not supported / denied — rely on Auto-Lock = Never */ }
    }

    function startPhotoBooth() {
      requestWakeLock();
      imagesCaptured = [];
      currentPhotoIndex = 1;
      startBtn.disabled = true;
      shareBtn.disabled = true;
      resetBtn.disabled = true;
      downloadBtn.disabled = true;
      shareStatus.innerText = "";
      capturePhotoSequence();
    }

    function capturePhotoSequence() {
      if (currentPhotoIndex > 3) { finishSession(); return; }
      indexLabel.innerText = `Strike a pose! Photo ${currentPhotoIndex} of 3`;
      countdownOverlay.classList.remove('opacity-0');
      let s = 3;
      countdownNumber.innerText = s;
      const interval = setInterval(() => {
        s--;
        if (s > 0) { countdownNumber.innerText = s; }
        else { clearInterval(interval); triggerFlashAndSnap(); }
      }, 1000);
    }

    function triggerFlashAndSnap() {
      flashOverlay.classList.add('flash-active');
      setTimeout(() => flashOverlay.classList.remove('flash-active'), 500);

      const width = video.videoWidth || 640;
      const height = video.videoHeight || 480;
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.translate(width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, width, height);

      const imgDataUrl = canvas.toDataURL('image/png');
      imagesCaptured.push(imgDataUrl);

      const previewImg = document.getElementById(`strip-img-${currentPhotoIndex}`);
      const placeholder = document.getElementById(`strip-placeholder-${currentPhotoIndex}`);
      previewImg.src = imgDataUrl;
      previewImg.classList.remove('hidden');
      placeholder.classList.add('hidden');

      countdownOverlay.classList.add('opacity-0');
      currentPhotoIndex++;
      setTimeout(capturePhotoSequence, 1500);
    }

    function finishSession() {
      startBtn.disabled = false;
      shareBtn.disabled = false;
      resetBtn.disabled = false;
      downloadBtn.disabled = false;
      shareStatus.innerText = "Tap Share to text, email, or save your strip.";
    }

    function resetPhotoBooth() {
      for (let i = 1; i <= 3; i++) {
        const previewImg = document.getElementById(`strip-img-${i}`);
        const placeholder = document.getElementById(`strip-placeholder-${i}`);
        previewImg.src = "";
        previewImg.classList.add('hidden');
        placeholder.classList.remove('hidden');
      }
      imagesCaptured = [];
      shareBtn.disabled = true;
      resetBtn.disabled = true;
      downloadBtn.disabled = true;
      shareStatus.innerText = "";
    }

    // Build the printable strip and hand back a PNG blob
    async function generateStripBlob() {
      // Make sure web fonts are loaded so the text renders on the canvas
      try {
        await document.fonts.ready;
        await Promise.all([
          document.fonts.load("italic 60px 'Cormorant Garamond'"),
          document.fonts.load("700 36px 'DM Sans'"),
          document.fonts.load("400 22px 'DM Sans'")
        ]);
      } catch (e) {}

      const names = document.getElementById('strip-names').innerText;
      const date = document.getElementById('strip-date').innerText;

      return new Promise((resolve) => {
        // 4in × 6in at 300 DPI = 1200 × 1800 px. Two identical strips side-by-side.
        const c = document.createElement('canvas');
        const ctx = c.getContext('2d');
        c.width = 1200; c.height = 1800;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, c.width, c.height);

        const imgs = [];
        let loaded = 0;
        for (let i = 0; i < 3; i++) {
          const img = new Image();
          img.onload = () => { loaded++; if (loaded === 3) draw(); };
          img.src = imagesCaptured[i];
          imgs.push(img);
        }

        function setSpacing(px) { try { ctx.letterSpacing = px + "px"; } catch (e) {} }

        function drawStrip(ox) {
          const colW = 540, sidePad = 20;
          const photoW = colW - sidePad * 2;   // 500
          const photoH = photoW * 3 / 4;        // 375
          const gap = 18, topPad = 40;
          const cx = ox + colW / 2;

          // three photos
          for (let i = 0; i < 3; i++) {
            const y = topPad + i * (photoH + gap);
            const im = imgs[i];
            // center-crop the source to fill the 4:3 slot (no stretching)
            const targetAspect = photoW / photoH;
            const iw = im.naturalWidth || im.width;
            const ih = im.naturalHeight || im.height;
            let sw = iw, sh = ih, sx = 0, sy = 0;
            if (iw / ih > targetAspect) {
              sw = ih * targetAspect;
              sx = (iw - sw) / 2;
            } else {
              sh = iw / targetAspect;
              sy = (ih - sh) / 2;
            }
            ctx.drawImage(im, sx, sy, sw, sh, ox + sidePad, y, photoW, photoH);
            ctx.strokeStyle = "#0ABAB5";
            ctx.lineWidth = 3;
            ctx.strokeRect(ox + sidePad + 1.5, y + 1.5, photoW - 3, photoH - 3);
          }

          // Save-the-Date footer
          ctx.textAlign = "center";

          ctx.fillStyle = "#0ABAB5";
          ctx.font = "400 26px 'DM Sans', sans-serif";
          ctx.fillText("\u25C7", cx, 1298);

          setSpacing(6);
          ctx.fillStyle = "#0ABAB5";
          ctx.font = "700 26px 'DM Sans', sans-serif";
          ctx.fillText("SAVE THE DATE", cx, 1350);
          setSpacing(0);

          // names with a little heart between them
          (function () {
            ctx.fillStyle = "#1e293b";
            ctx.font = "italic 600 58px 'Cormorant Garamond', serif";
            const parts = names.split('&');
            if (parts.length === 2) {
              const left = parts[0].trim();
              const right = parts[1].trim();
              const gap = 20;
              const leftW = ctx.measureText(left).width;
              const rightW = ctx.measureText(right).width;
              ctx.font = "400 34px 'DM Sans', sans-serif";
              const heartW = ctx.measureText("\u2665").width;
              ctx.font = "italic 600 58px 'Cormorant Garamond', serif";
              const total = leftW + gap + heartW + gap + rightW;
              let x = cx - total / 2;
              ctx.textAlign = "left";
              ctx.fillText(left, x, 1430);
              x += leftW + gap;
              ctx.fillStyle = "#0ABAB5";
              ctx.font = "400 34px 'DM Sans', sans-serif";
              ctx.fillText("\u2665", x, 1424);
              x += heartW + gap;
              ctx.fillStyle = "#1e293b";
              ctx.font = "italic 600 58px 'Cormorant Garamond', serif";
              ctx.fillText(right, x, 1430);
              ctx.textAlign = "center";
            } else {
              ctx.fillText(names, cx, 1430);
            }
          })();

          ctx.fillStyle = "#64748b";
          ctx.font = "400 22px 'DM Sans', sans-serif";
          ctx.fillText("are getting married", cx, 1474);

          ctx.fillStyle = "#0ABAB5";
          ctx.font = "700 36px 'DM Sans', sans-serif";
          ctx.fillText(date, cx, 1540);
        }

        function draw() {
          drawStrip(40);    // left copy
          drawStrip(620);   // right copy

          // faint dashed cut line down the middle
          ctx.save();
          ctx.strokeStyle = "#cbd5e1";
          ctx.lineWidth = 1;
          ctx.setLineDash([6, 8]);
          ctx.beginPath();
          ctx.moveTo(600, 30);
          ctx.lineTo(600, 1770);
          ctx.stroke();
          ctx.restore();

          c.toBlob((blob) => resolve(blob), 'image/png');
        }
      });
    }

    function triggerDownload(blob) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = "sheva-david-save-the-date.png";
      link.href = url;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    // Native iOS share sheet → Messages, Mail, AirDrop, Save to Photos
    async function shareStrip() {
      if (imagesCaptured.length < 3) return;
      shareStatus.innerText = "Preparing your strip…";
      const blob = await generateStripBlob();
      const file = new File([blob], "sheva-david-save-the-date.png", { type: "image/png" });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: "Sheva & David — Save the Date",
            text: "Save the Date! Sheva & David · September 4th, 2026 💍"
          });
          shareStatus.innerText = "Sent! Pick Messages, Mail, or Save Image.";
        } catch (e) {
          shareStatus.innerText = ""; // guest cancelled the sheet
        }
      } else {
        triggerDownload(blob);
        shareStatus.innerText = "Sharing unavailable here — saved to this iPad instead.";
      }
    }

    // Always keeps a copy on the host iPad (Files ▸ Downloads) for sharing later
    async function saveStrip() {
      if (imagesCaptured.length < 3) return;
      shareStatus.innerText = "Saving…";
      const blob = await generateStripBlob();
      triggerDownload(blob);
      shareStatus.innerText = "Saved to this iPad (Files ▸ Downloads).";
    }

    function toggleConfigModal() {
      document.getElementById('config-modal').classList.toggle('hidden');
    }

    function saveConfig() {
      const names = document.getElementById('input-names').value;
      const sub = document.getElementById('input-sub').value;
      const date = document.getElementById('input-date').value;
      document.getElementById('strip-names').innerText = names;
      document.getElementById('strip-date').innerText = date;
      document.getElementById('sub-header-date').innerText = `${sub} · ${date}`;
      toggleConfigModal();
    }
  </script>
</body>
</html>
